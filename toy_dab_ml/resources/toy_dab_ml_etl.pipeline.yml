# The main pipeline for toy_dab_ml

resources:
  pipelines:
    toy_dab_ml_etl:
      name: toy_dab_ml_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/toy_dab_ml_etl"

      libraries:
        - glob:
            include: ../src/toy_dab_ml_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
